body:
  text: 太上老君玄妙枕中内德神咒經黄庭遁甲縁身經太上老君玄妙枕中内德神咒經老君曰大道無形常居杳冥隨機化物以應精誠子能寂念受吾眞經能持受者口淨神清然後誦之萬惡不生可以治病可以延齡百邪不干群妖束形所以然者一切有情受吾眞經乃得長生今更於中苦鍊身形常靜三業澄止六情自然五神守護三一長存坐卧安穩魂魄康寧旦夕兩時三徧誦經耳聦目明身强體輕一如後文子當諦聽老君曰子等身中有三萬六千神左三魂右七魄身有千二百形影體有萬二千精光五藏六腑二十四神常存念之勿令離身有病三呼即降其眞老君曰子欲過度三災九厄應作是言我以天爲父地爲母吾居其中常如赤子曰爲功曹月爲主簿雷公使者在吾左右風伯雨師在吾前後六甲直符周匝園繞青龍扶吾左白虎侍吾右朱雀導吾前玄武從吾後北斗覆吾頭天罡指吾首騰蛇在吾足爲吾滅殃咎吾居丹房中太一爲吾偶左三右七戴九履一二四爲吾肩六八爲吾足吾居中宫以爲腹實令敕千鬼萬神各還本郷當吾者死背吾者亡速岀奔迸隠匿深藏大丁力士斬滅不祥急急如律令老君曰臨卧之時當岀四獸自衞其身青龍從吾肝出在吾左白虎從吾肺出在吾右朱雀從吾心出在吾前玄武從吾腎岀在吾後汝等四獸磨牙礪齒在吾左右前後辟除衆邪妖鬼不得妄來干吾玉房令吾坐卧安穏無惡夢想急急如律令老君曰都念旣畢即當還神肝主藏魂肺主藏魄心主藏神脾主藏意腎主藏精青龍還吾肝朱雀還吾心白虎還吾肺玄武還吾腎黃龍鎮吾脾以爲腹實衆邪惡鬼不得下居急急如律令老君曰還神旣訖即鳴天鼓三十六通咽液三十六過即閉氣從一至十心暗數之滿九便止當存心中赤氣從口而岀狀如火光輪行四布周遍室中定即內想自然安寢其中常能如此永無疾患千災萬魅莫或敢干與道合眞長生乆視子孫昌樂富貴日興金車入門仕宦髙遷禄位三公心忠志孝輔弼帝君急急如太上女青詔書律令太上老君玄妙枕中内德神咒經
